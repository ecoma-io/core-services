  <!-- Iframe Container (occupies the rest of the screen) -->
  <div class="iframe-container relative">
    <!-- Loading Overlay - Shown when the iframe is loading -->
    <div id="loading-overlay"
      class="absolute inset-0 flex items-center justify-center bg-white/80 backdrop-blur-sm z-20 transition-opacity duration-300 opacity-0 pointer-events-none">
      <!-- Spinner -->
      <div class="w-12 h-12 border-4 border-teal-500 border-t-transparent rounded-full animate-spin"></div>
      <span class="ml-4 text-teal-600 font-semibold">Loading content...</span>
    </div>

    <!-- Main Iframe - Initially empty, then replaced -->
    <iframe id="main-iframe" src="" frameborder="0"
      class="w-full h-full opacity-0 transition-opacity duration-500"></iframe>
  </div>

  <script>
    /**
     * Adds a unique query parameter (cache-buster) to a URL.
     * This forces the browser to reload the iframe, not use an old cache.
     * @param {string} url - The original URL.
     * @returns {string} The URL with the cache-buster added.
     */
    function addCacheBuster(url) {
      if (!url) return '';
      try {
        const urlObj = new URL(url);
        urlObj.searchParams.set('cb', Date.now());
        return urlObj.toString();
      } catch (e) {
        const separator = url.includes('?') ? '&' : '?';
        return `${url}${separator}cb=${Date.now()}`;
      }
    }

    // --- DOM Elements ---
    let mainIframeContainer;
    let loadingOverlay;
    let currentIframe = null; // Variable to track the current iframe

    /**
     * Strictly checks if a URL is safe to load in an iframe.
     * - Only http(s) protocols allowed
     * - Cannot be javascript:, data:, etc.
     * - (Optionally) limit to same-origin or whitelisted hosts
     * @param {string} url
     * @returns {boolean}
     */
    function isSafeUrl(url) {
      if (typeof url !== 'string' || !url) return false;
      try {
        const parsed = new URL(url, window.location.origin); // supports root-relative
        // Restrict protocols
        if (!['http:', 'https:'].includes(parsed.protocol)) return false;
        // Optionally: restrict domain
        // Uncomment and add your trusted hosts as needed
        // const trustedHosts = ['mydomain.com', window.location.hostname];
        // if (!trustedHosts.includes(parsed.hostname)) return false;
        return true;
      } catch (e) {
        return false;
      }
    }

    // Function to show a notification (replaces alert)
    function showToast(message, type) {
      const toast = document.createElement('div');
      toast.textContent = message;
      toast.className = `fixed bottom-4 right-4 p-4 rounded-lg shadow-xl text-white ${type === 'error' ? 'bg-red-500' : 'bg-blue-500'
        } z-50 transition-transform transform translate-x-full`;
      document.body.appendChild(toast);

      // Show toast
      setTimeout(() => {
        toast.classList.remove('translate-x-full');
        toast.classList.add('translate-x-0');
      }, 10);

      // Hide toast
      setTimeout(() => {
        toast.classList.remove('translate-x-0');
        toast.classList.add('translate-x-full');
        setTimeout(() => document.body.removeChild(toast), 300); // Wait for transition to end
      }, 3000);
    }

    function showLoading() {
      loadingOverlay.classList.remove('opacity-0', 'pointer-events-none');
    }

    function hideLoading() {
      loadingOverlay.classList.add('opacity-0', 'pointer-events-none');
    }

    /**
     * Removes the old iframe, shows loading, creates and loads a new iframe.
     * @param {string} url - The new URL to load.
     * @param {string} title - The new page title.
     */
    function loadNewIframe(url, title) {
      if (!url || !mainIframeContainer) return;
      // Defensive: prevent even direct calls with dangerous URLs
      if (!isSafeUrl(url)) {
        showToast('Blocked loading of unsafe iframe URL.', 'error');
        return;
      }

      // 1. Update Title
      document.title = `${title} | Ecoma Core Dashboard`;

      // 2. Remove old iframe if it exists
      if (currentIframe) {
        mainIframeContainer.removeChild(currentIframe);
        currentIframe = null;
      }

      // 3. Show Loading Indicator
      showLoading();

      // 4. Create new iframe
      const newIframe = document.createElement('iframe');
      newIframe.id = 'main-iframe';
      newIframe.src = addCacheBuster(url);
      newIframe.frameBorder = '0';
      // Start hidden, then fade in when loaded
      newIframe.className =
        'w-full h-full opacity-0 transition-opacity duration-500';
      newIframe.style.display = 'none'; // Ensure no flash before onload

      // 5. Add iframe to Container
      mainIframeContainer.appendChild(newIframe);
      currentIframe = newIframe;

      // 6. Handle load event (onload)
      newIframe.onload = () => {
        newIframe.style.display = 'block'; // Show iframe
        // Use setTimeout to ensure the browser has time to render before fading in
        setTimeout(() => {
          newIframe.classList.remove('opacity-0'); // Fade in
          hideLoading(); // Hide loading after iframe is loaded and faded in
        }, 50);
      };

      // 7. Handle load error (onerror) - Hard to catch accurately with iframes, but still good to have
      newIframe.onerror = () => {
        hideLoading();
        newIframe.style.display = 'block';
        newIframe.classList.remove('opacity-0');
        showToast(
          'Could not load iframe content. (X-Frame-Options or invalid URL)',
          'error'
        );
      };
    }

    document.addEventListener('DOMContentLoaded', () => {
      const menuItems = document.querySelectorAll('.menu-item');
      mainIframeContainer = document.querySelector('.iframe-container');
      loadingOverlay = document.getElementById('loading-overlay');

      // Remove the initial iframe created in HTML so JS can manage the entire lifecycle
      const initialIframe = document.getElementById('main-iframe');
      if (initialIframe) {
        initialIframe.remove();
      }

      // --- Default URL Handling ---
      if (menuItems.length > 0) {
        const defaultItem = menuItems[0];
        const defaultUrl = defaultItem.getAttribute('data-url');
        const defaultTitle =
          defaultItem.getAttribute('data-title') || 'Document';

        // Load the default iframe if the URL is valid
        if (isSafeUrl(defaultUrl)) {
          loadNewIframe(defaultUrl, defaultTitle);
        } else {
          // Optionally, show error or fallback behaviour
          console.warn('Unsafe URL blocked in data-url:', defaultUrl);
        }

        // Set active state for the first menu item
        defaultItem.classList.add('bg-teal-100', 'text-teal-700');
        defaultItem.classList.remove(
          'text-gray-700',
          'hover:text-teal-600',
          'hover:bg-teal-50'
        );
      }
      // ----------------------------------------------------

      // Handle click events for menu items
      menuItems.forEach((item) => {
        item.addEventListener('click', (event) => {
          event.preventDefault();

          const newUrl = item.getAttribute('data-url');
          const title = item.getAttribute('data-title') || 'Dashboard';

          if (isSafeUrl(newUrl)) {
            // 1. Load new content
            loadNewIframe(newUrl, title);

            // 2. Handle active state of the menu
            menuItems.forEach((menu) => {
              menu.classList.remove('bg-teal-100', 'text-teal-700');
              menu.classList.add(
                'text-gray-700',
                'hover:text-teal-600',
                'hover:bg-teal-50'
              );
            });

            item.classList.add('bg-teal-100', 'text-teal-700');
            item.classList.remove(
              'text-gray-700',
              'hover:text-teal-600',
              'hover:bg-teal-50'
            );
          } else {
            console.error('Error: Unsafe or invalid URL blocked.', {
              newUrl,
            });
            showToast('Path not found or is unsafe.', 'error');
          }
        });
      });


    });
  </script>
