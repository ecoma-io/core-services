<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Ecoma Core Services</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Description" />
    <link rel="icon" href="/assets/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <style>
      .app-name-link > img {
        height: 1.25rem;
        margin-left: 15px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      // Docsify configuration
      window.$docsify = {
        basePath: '/docs',
        themeColor: '#42b883',
        loadNavbar: false,
        loadSidebar: 'index.md',
        homepage: 'overview.md',
        autoHeader: true,
        auto2top: true,
        pagination: {
          crossChapter: true,
          crossChapterText: true,
        },
        mermaidConfig: {
          querySelector: '.mermaid',
        },
      };
    </script>

    <script>
      /**
       * Initialize a WebSocket connection to the same host to support
       * live-reload messages. Uses wss for https and ws for http.
       *
       * @remarks
       * - Parses incoming JSON messages and handles messages of { type: 'reload' }.
       * - All parsing errors are caught and ignored to allow non-JSON messages.
       * - Uses named handlers to simplify testing and readability.
       *
       * @returns {void}
       */
      function initLiveReload() {
        try {
          const scheme = location.protocol === 'https:' ? 'wss' : 'ws';
          const url = `${scheme}://${location.host}`;
          const ws = new WebSocket(url);

          ws.addEventListener('open', () => {
            console.info('[live] ws open');
          });

          ws.addEventListener('close', () => {
            console.info('[live] ws closed');
          });

          ws.addEventListener('error', (event) => {
            // Keep the message concise; detailed info available in the event object.
            console.warn('[live] ws error', event);
          });

          ws.addEventListener('message', handleLiveMessage);
        } catch (err) {
          // If WebSocket isn't supported or constructing it fails, log a warning.
          console.warn('[live] live reload initialization failed', err);
        }
      }

      /**
       * Handle incoming WebSocket messages for live reload.
       *
       * @param {MessageEvent} ev - The WebSocket message event.
       * @returns {void}
       */
      function handleLiveMessage(ev) {
        try {
          // Only attempt to parse string payloads.
          if (typeof ev?.data !== 'string') return;

          const msg = JSON.parse(ev.data);

          // Ensure msg is an object and type equals 'reload'
          if (msg && msg.type === 'reload') {
            console.info('[live] reload message received — reloading page');
            // Optional: show a small overlay before reload, or implement hot-reload logic here.
            location.reload();
          }
        } catch (err) {
          // Ignore non-JSON or malformed messages on the socket.
        }
      }

      // Start live reload in a safe manner.
      initLiveReload();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="https://unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>

    <script type="module">

      // Expose for plugins that expect a global mermaid object
      window.mermaid = mermaid;
    </script>
    <script src="https://unpkg.com/docsify-mermaid@2.0.1/dist/docsify-mermaid.js"></script>
